<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TelWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 사이드바 -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 2C6.03 2 2 6.03 2 11s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm3.5 5.5l-1.5 7-2.5-3-3 2 1.5-7 2.5 3 3-2z" fill="currentColor"/>
        </svg>
        <span>TelWeb</span>
      </div>
      <div id="conn-dot" class="dot disconnected" title="연결 상태"></div>
    </div>

    <div id="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="채팅 검색" autocomplete="off" />
    </div>

    <div id="dialog-list">
      <div class="list-placeholder">
        <div class="spinner"></div>
        <span>채팅 불러오는 중</span>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <main id="main">
    <div id="panels-wrap">
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>채팅을 선택하세요</h2>
        <p>왼쪽 목록에서 채팅을 클릭하면<br/>새 패널이 열립니다.</p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
