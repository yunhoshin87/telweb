<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelWeb AI | Multi-Panel Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>TelWeb AI</h1>
            <p>기획서 기반의 멀티 패널 대시보드</p>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="마스터 비밀번호 입력">
            </div>
            <button class="btn-primary" id="login-btn">대시보드 입장</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="app-container" style="display: none; flex-direction: column;">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <h2 class="logo">TelWeb AI</h2>
            </div>
            <div class="header-right">
                <select id="chat-selector" class="chat-dropdown">
                    <option value="">채팅방 선택...</option>
                </select>
                <button class="btn-primary" id="add-panel-btn">+ 패널 추가</button>
                <button class="btn-secondary" id="logout-btn">로그아웃</button>
            </div>
        </header>

        <!-- Multi-Panel Container -->
        <main class="dashboard-grid" id="panel-container">
            <!-- Chat panels will be added here side-by-side -->
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">🏠</div>
                <p>상단에서 채팅방을 선택하고 패널을 추가해 보세요.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
